services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: MedManageDB
      POSTGRES_USER: MedManager
      POSTGRES_PASSWORD: medmanage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U MedManager -d MedManageDB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/vladryasov/medmanage/backend:latest
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=MedManageDB;Username=MedManager;Password=medmanage
    ports:
      - "5151:8080"
    restart: unless-stopped

volumes:
  pgdata:
